steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest'
      - '-f'
      - 'api/Dockerfile'   # ← explicit Dockerfile path
      - './api'            # ← build context is the api/ folder

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}'

substitutions:
  _REGION: europe-west9
  _REPO: cat-litter-monitor-registry-docker
  _SERVICE: litter-api

options:
  logging: CLOUD_LOGGING_ONLY
  pool: {}  # uses the default regional pool

tags:
  - europe-west9
